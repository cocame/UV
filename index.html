<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UV Index</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px 40px;
    overflow-x: hidden;
    position: relative;
  }

  /* Deep blue sky */
  .sky {
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg,
      #1a6abf 0%,
      #2277cc 25%,
      #3a8fd4 55%,
      #6ab0e0 75%,
      #a8d0ee 88%,
      #d0e8f8 100%
    );
    z-index: 0;
  }

  /* Cloud layer at bottom */
  .cloud-layer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 45%;
    z-index: 1;
    pointer-events: none;
  }

  /* Big fluffy clouds using box-shadow stacking */
  .cloud-base {
    position: absolute;
    background: white;
    border-radius: 50%;
  }

  /* Cloud group 1 - left */
  .cl1 { width: 340px; height: 180px; bottom: 0;   left: -60px;  filter: blur(8px);  opacity: 0.97; border-radius: 50% 50% 0 0; }
  .cl2 { width: 220px; height: 160px; bottom: 60px; left: -20px; filter: blur(6px);  opacity: 0.95; }
  .cl3 { width: 180px; height: 150px; bottom: 80px; left: 100px; filter: blur(5px);  opacity: 0.92; }

  /* Cloud group 2 - center */
  .cc1 { width: 380px; height: 200px; bottom: 0;    left: 50%;  transform: translateX(-50%); filter: blur(10px); opacity: 0.98; border-radius: 50% 50% 0 0; }
  .cc2 { width: 260px; height: 180px; bottom: 70px; left: 50%;  transform: translateX(-70%); filter: blur(7px);  opacity: 0.93; }
  .cc3 { width: 240px; height: 170px; bottom: 60px; left: 50%;  transform: translateX(-10%); filter: blur(7px);  opacity: 0.90; }
  .cc4 { width: 180px; height: 140px; bottom: 120px;left: 50%;  transform: translateX(-50%); filter: blur(5px);  opacity: 0.88; }

  /* Cloud group 3 - right */
  .cr1 { width: 320px; height: 170px; bottom: 0;   right: -50px; filter: blur(9px);  opacity: 0.96; border-radius: 50% 50% 0 0; }
  .cr2 { width: 200px; height: 150px; bottom: 55px; right: 10px; filter: blur(6px);  opacity: 0.91; }
  .cr3 { width: 160px; height: 130px; bottom: 80px; right: 130px;filter: blur(5px);  opacity: 0.87; }

  /* Soft atmospheric haze */
  .haze {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 30%;
    background: linear-gradient(to top, rgba(255,255,255,0.6) 0%, transparent 100%);
    z-index: 2;
    pointer-events: none;
  }

  .main {
    position: relative;
    z-index: 3;
    width: 100%;
    max-width: 340px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .card {
    width: 100%;
    background: rgba(255,255,255,0.22);
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
    border: 1px solid rgba(255,255,255,0.55);
    border-radius: 28px;
    padding: 32px 28px 28px;
    text-align: center;
    box-shadow: 0 8px 40px rgba(20,80,160,0.18), inset 0 1px 0 rgba(255,255,255,0.6);
  }

  .city-name {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 8px rgba(0,60,140,0.3);
    margin-bottom: 2px;
  }

  .subtitle {
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
    letter-spacing: 0.13em;
    margin-bottom: 24px;
  }

  .uv-big {
    font-size: 100px;
    font-weight: 900;
    line-height: 1;
    color: var(--uv-color, rgba(255,255,255,0.5));
    transition: color 0.5s;
    margin-bottom: 4px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.1);
  }

  .uv-label {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--uv-color, rgba(255,255,255,0.5));
    transition: color 0.5s;
    margin-bottom: 20px;
  }

  .temp-row {
    font-size: 30px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 8px rgba(0,60,140,0.2);
    margin-bottom: 16px;
  }

  /* AQI block */
  .aqi-block {
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 16px;
    padding: 12px 16px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .aqi-left { text-align: left; }

  .aqi-title {
    font-size: 10px;
    color: rgba(255,255,255,0.65);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 2px;
  }

  .aqi-value {
    font-size: 22px;
    font-weight: 800;
    color: var(--aqi-color, #fff);
    transition: color 0.5s;
  }

  .aqi-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--aqi-color, rgba(255,255,255,0.8));
    transition: color 0.5s;
  }

  .aqi-tip {
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    text-align: right;
    line-height: 1.4;
    max-width: 140px;
  }

  .tip-box {
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: 14px;
    padding: 11px 14px;
    font-size: 12px;
    color: rgba(255,255,255,0.85);
    line-height: 1.55;
    text-align: left;
  }

  .tip-box strong { color: #fff; }

  .geo-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 22px;
    border-radius: 22px;
    border: 1px solid rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(12px);
    color: #fff;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-shadow: 0 1px 4px rgba(0,60,140,0.2);
  }

  .geo-btn:hover { background: rgba(255,255,255,0.35); transform: translateY(-1px); }

  .search-wrap { width: 100%; position: relative; }

  .search-input {
    width: 100%;
    padding: 11px 16px;
    border-radius: 22px;
    border: 1px solid rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(12px);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    color: #fff;
    outline: none;
  }

  .search-input::placeholder { color: rgba(255,255,255,0.55); }
  .search-input:focus { background: rgba(255,255,255,0.3); }

  .dropdown {
    position: absolute;
    top: calc(100% + 6px);
    left: 0; right: 0;
    background: rgba(30,90,180,0.92);
    backdrop-filter: blur(20px);
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.3);
    box-shadow: 0 8px 32px rgba(0,40,120,0.3);
    max-height: 220px;
    overflow-y: auto;
    z-index: 10;
    display: none;
  }

  .dropdown.open { display: block; }

  .drop-item {
    padding: 10px 16px;
    font-size: 14px;
    color: #fff;
    cursor: pointer;
    transition: background 0.15s;
  }

  .drop-item:hover { background: rgba(255,255,255,0.15); }

  .updated {
    font-size: 10px;
    color: rgba(255,255,255,0.5);
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
  }
  .loading .uv-big   { animation: pulse 1.2s ease-in-out infinite; }
  .loading .temp-row { animation: pulse 1.2s ease-in-out infinite; }
  .loading .aqi-value { animation: pulse 1.2s ease-in-out infinite; }
</style>
</head>
<body>

<div class="sky"></div>
<div class="cloud-layer">
  <div class="cloud-base cl1"></div>
  <div class="cloud-base cl2"></div>
  <div class="cloud-base cl3"></div>
  <div class="cloud-base cc1"></div>
  <div class="cloud-base cc2"></div>
  <div class="cloud-base cc3"></div>
  <div class="cloud-base cc4"></div>
  <div class="cloud-base cr1"></div>
  <div class="cloud-base cr2"></div>
  <div class="cloud-base cr3"></div>
</div>
<div class="haze"></div>

<div class="main">
  <div class="card loading" id="card">
    <div class="city-name" id="cityName">Определение...</div>
    <div class="subtitle">УФ · Температура · Воздух</div>
    <div class="uv-big" id="uvNum">–</div>
    <div class="uv-label" id="uvLabel">загрузка</div>
    <div class="temp-row" id="temp">–</div>
    <div class="aqi-block">
      <div class="aqi-left">
        <div class="aqi-title">Качество воздуха</div>
        <div class="aqi-value" id="aqiValue">–</div>
        <div class="aqi-label" id="aqiLabel">загрузка</div>
      </div>
      <div class="aqi-tip" id="aqiTip">...</div>
    </div>
    <div class="tip-box" id="tip">Получение данных...</div>
  </div>

  <button class="geo-btn" onclick="geoLocate()">📍 Моё местоположение</button>

  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="text" placeholder="🔍 Найти город..." autocomplete="off"/>
    <div class="dropdown" id="dropdown"></div>
  </div>

  <div class="updated" id="updated"></div>
</div>

<script>
const CITIES = [
  { name: 'Дананг',        lat: 16.047, lon: 108.206 },
  { name: 'Хой Ан',        lat: 15.880, lon: 108.335 },
  { name: 'Хюэ',           lat: 16.463, lon: 107.590 },
  { name: 'Нячанг',        lat: 12.238, lon: 109.196 },
  { name: 'Хошимин',       lat: 10.823, lon: 106.629 },
  { name: 'Ханой',         lat: 21.027, lon: 105.834 },
  { name: 'Далат',         lat: 11.940, lon: 108.458 },
  { name: 'Фукуок',        lat: 10.227, lon: 103.964 },
  { name: 'Муй Не',        lat: 10.933, lon: 108.286 },
  { name: 'Халонг',        lat: 20.959, lon: 107.042 },
  { name: 'Шапа',          lat: 22.336, lon: 103.844 },
  { name: 'Нинь Бинь',     lat: 20.253, lon: 105.975 },
  { name: 'Фан Тхьет',     lat: 10.929, lon: 108.102 },
  { name: 'Вунг Тау',      lat: 10.346, lon: 107.084 },
  { name: 'Кан Тхо',       lat: 10.045, lon: 105.748 },
  { name: 'Куи Нён',       lat: 13.776, lon: 109.223 },
  { name: 'Куанг Нгай',    lat: 15.120, lon: 108.792 },
  { name: 'Буон Ма Тхуот', lat: 12.667, lon: 108.050 },
  { name: 'Плейку',        lat: 13.983, lon: 108.000 },
  { name: 'Кон Тум',       lat: 14.350, lon: 108.000 },
  { name: 'Тхань Хоа',     lat: 19.808, lon: 105.776 },
  { name: 'Винь',          lat: 18.680, lon: 105.681 },
  { name: 'Донг Хой',      lat: 17.480, lon: 106.600 },
  { name: 'Хай Фонг',      lat: 20.844, lon: 106.688 },
  { name: 'Лао Кай',       lat: 22.485, lon: 103.975 },
  { name: 'Диен Бьен Фу',  lat: 21.386, lon: 103.016 },
  { name: 'Фан Ранг',      lat: 11.565, lon: 108.988 },
  { name: 'Биен Хоа',      lat: 10.958, lon: 106.843 },
  { name: 'Вьет Три',      lat: 21.399, lon: 105.438 },
  { name: 'Ми Тхо',        lat: 10.360, lon: 106.362 },
  { name: 'Камау',         lat: 9.177,  lon: 105.150 },
  { name: 'Рать Жиа',      lat: 10.012, lon: 105.080 },
  { name: 'Бен Тре',       lat: 10.243, lon: 106.375 },
  { name: 'Ан Жанг',       lat: 10.388, lon: 105.435 },
  { name: 'Тай Нинь',      lat: 11.310, lon: 106.100 },
  { name: 'Ха Тинь',       lat: 18.342, lon: 105.906 },
  { name: 'Нам Динь',      lat: 20.420, lon: 106.168 },
  { name: 'Тхай Нгуен',    lat: 21.567, lon: 105.825 },
  { name: 'Хоа Бинь',      lat: 20.813, lon: 105.338 },
];

function uvInfo(uv) {
  if (uv <= 2)  return { label: 'Низкий',        color: '#4ade80', tip: '<strong>Защита не обязательна.</strong> Можно находиться на солнце без ограничений.' };
  if (uv <= 5)  return { label: 'Умеренный',     color: '#fde047', tip: '<strong>SPF 30+, солнечные очки.</strong> Тень рекомендуется в полдень.' };
  if (uv <= 7)  return { label: 'Высокий',       color: '#fb923c', tip: '<strong>SPF 50+, тень с 11 до 16ч.</strong> Головной убор обязателен.' };
  if (uv <= 10) return { label: 'Очень высокий', color: '#f87171', tip: '<strong>SPF 50+, минимум на улице.</strong> Кожа горит за 15–20 минут.' };
  return             { label: 'Экстремальный',   color: '#e879f9', tip: '<strong>Оставайтесь в помещении.</strong> Максимальная защита при выходе.' };
}

// AQI European index (1-5)
function aqiInfo(aqi) {
  if (aqi <= 1) return { label: 'Отличный',     color: '#4ade80', tip: 'Идеальный воздух' };
  if (aqi <= 2) return { label: 'Хороший',      color: '#a3e635', tip: 'Воздух чистый' };
  if (aqi <= 3) return { label: 'Умеренный',    color: '#fde047', tip: 'Чувствительным людям осторожно' };
  if (aqi <= 4) return { label: 'Плохой',       color: '#fb923c', tip: 'Ограничьте время на улице' };
  return              { label: 'Очень плохой',  color: '#f87171', tip: 'Избегайте улицы' };
}

let currentLat = null, currentLon = null, currentName = 'Дананг';

async function loadByCoords(lat, lon, name) {
  currentLat = lat; currentLon = lon; currentName = name;
  document.getElementById('card').classList.add('loading');
  document.getElementById('cityName').textContent = name;
  try {
    const [weatherRes, airRes] = await Promise.all([
      fetch('https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon +
        '&current=uv_index,temperature_2m&timezone=Asia%2FHo_Chi_Minh&forecast_days=1'),
      fetch('https://air-quality-api.open-meteo.com/v1/air-quality?latitude=' + lat + '&longitude=' + lon +
        '&current=european_aqi&timezone=Asia%2FHo_Chi_Minh')
    ]);
    const weather = await weatherRes.json();
    const air     = await airRes.json();

    const uv  = Math.round(weather.current.uv_index * 10) / 10;
    const t   = Math.round(weather.current.temperature_2m);
    const aqi = air.current.european_aqi;

    const uvI  = uvInfo(uv);
    const aqiI = aqiInfo(aqi);

    document.documentElement.style.setProperty('--uv-color',  uvI.color);
    document.documentElement.style.setProperty('--aqi-color', aqiI.color);

    document.getElementById('card').classList.remove('loading');
    document.getElementById('uvNum').textContent   = uv;
    document.getElementById('uvLabel').textContent = uvI.label;
    document.getElementById('temp').textContent    = t + '°C';
    document.getElementById('aqiValue').textContent = aqi;
    document.getElementById('aqiLabel').textContent = aqiI.label;
    document.getElementById('aqiTip').textContent   = aqiI.tip;
    document.getElementById('tip').innerHTML        = uvI.tip;

    const now = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('updated').textContent = 'Обновлено ' + now + ' (UTC+7)';
  } catch(e) {
    document.getElementById('card').classList.remove('loading');
    document.getElementById('tip').textContent = 'Ошибка загрузки. Проверьте интернет.';
  }
}

function geoLocate() {
  if (!navigator.geolocation) { loadByCoords(16.047, 108.206, 'Дананг'); return; }
  document.getElementById('cityName').textContent = 'Определение...';
  navigator.geolocation.getCurrentPosition(
    pos => loadByCoords(pos.coords.latitude, pos.coords.longitude, 'Моё местоположение'),
    ()  => loadByCoords(16.047, 108.206, 'Дананг')
  );
}

const searchInput = document.getElementById('searchInput');
const dropdown    = document.getElementById('dropdown');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) { dropdown.classList.remove('open'); return; }
  const results = CITIES.filter(c => c.name.toLowerCase().includes(q)).slice(0, 8);
  if (!results.length) { dropdown.classList.remove('open'); return; }
  dropdown.innerHTML = results.map(c =>
    '<div class="drop-item" onclick="selectCity(\'' + c.name + '\',' + c.lat + ',' + c.lon + ')">' + c.name + '</div>'
  ).join('');
  dropdown.classList.add('open');
});

function selectCity(name, lat, lon) {
  searchInput.value = '';
  dropdown.classList.remove('open');
  loadByCoords(lat, lon, name);
}

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) dropdown.classList.remove('open');
});

geoLocate();
setInterval(() => {
  if (currentLat) loadByCoords(currentLat, currentLon, currentName);
}, 30 * 60 * 1000);
</script>
</body>
</html>
