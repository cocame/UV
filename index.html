<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UV Index</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    overflow-x: hidden;
    position: relative;
  }

  .sky {
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg,
      #b8d8f0 0%,
      #cce4f5 30%,
      #dff0fb 60%,
      #eef7fd 100%
    );
    z-index: 0;
  }

  .clouds {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
  }

  .cloud {
    position: absolute;
    border-radius: 50%;
    background: white;
  }

  .c1 { width: 500px; height: 160px; top: 4%;  left: -10%; filter: blur(35px); opacity: 0.85; }
  .c2 { width: 360px; height: 130px; top: 8%;  left: 45%;  filter: blur(30px); opacity: 0.75; }
  .c3 { width: 460px; height: 140px; top: 1%;  left: 58%;  filter: blur(38px); opacity: 0.7;  }
  .c4 { width: 280px; height: 100px; top: 30%; left: 5%;   filter: blur(44px); opacity: 0.45; }
  .c5 { width: 400px; height: 120px; top: 25%; left: 55%;  filter: blur(42px); opacity: 0.4;  }
  .c6 { width: 460px; height: 110px; top: 60%; left: -5%;  filter: blur(55px); opacity: 0.3;  }
  .c7 { width: 320px; height: 100px; top: 68%; left: 60%;  filter: blur(50px); opacity: 0.25; }

  .main {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 340px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .card {
    width: 100%;
    background: rgba(255,255,255,0.52);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.85);
    border-radius: 28px;
    padding: 36px 28px 30px;
    text-align: center;
    box-shadow: 0 6px 32px rgba(90,150,210,0.12);
  }

  .city-name {
    font-size: 20px;
    font-weight: 700;
    color: #1a3a5c;
    margin-bottom: 2px;
  }

  .subtitle {
    font-size: 11px;
    color: #7a99b8;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 28px;
  }

  .uv-big {
    font-size: 108px;
    font-weight: 900;
    line-height: 1;
    color: var(--uv-color, #7a99b8);
    transition: color 0.5s;
    margin-bottom: 4px;
  }

  .uv-label {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--uv-color, #7a99b8);
    transition: color 0.5s;
    margin-bottom: 22px;
  }

  .temp-row {
    font-size: 28px;
    font-weight: 700;
    color: #1a3a5c;
    margin-bottom: 16px;
  }

  .tip-box {
    background: rgba(255,255,255,0.55);
    border-radius: 14px;
    padding: 11px 14px;
    font-size: 12px;
    color: #4a6a8a;
    line-height: 1.55;
    text-align: left;
    border: 1px solid rgba(255,255,255,0.9);
  }

  .tip-box strong { color: var(--uv-color, #4a6a8a); transition: color 0.5s; }

  .geo-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 22px;
    border-radius: 22px;
    border: 1px solid rgba(255,255,255,0.85);
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(12px);
    color: #2a5a8c;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 2px 12px rgba(90,150,210,0.1);
  }

  .geo-btn:hover {
    background: rgba(255,255,255,0.8);
    transform: translateY(-1px);
  }

  .search-wrap {
    width: 100%;
    position: relative;
  }

  .search-input {
    width: 100%;
    padding: 11px 16px;
    border-radius: 22px;
    border: 1px solid rgba(255,255,255,0.85);
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(12px);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    color: #1a3a5c;
    outline: none;
    box-shadow: 0 2px 12px rgba(90,150,210,0.08);
  }

  .search-input::placeholder { color: #9ab5cc; }
  .search-input:focus { background: rgba(255,255,255,0.8); }

  .dropdown {
    position: absolute;
    top: calc(100% + 6px);
    left: 0; right: 0;
    background: rgba(255,255,255,0.94);
    backdrop-filter: blur(20px);
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.9);
    box-shadow: 0 8px 32px rgba(90,150,210,0.18);
    max-height: 220px;
    overflow-y: auto;
    z-index: 10;
    display: none;
  }

  .dropdown.open { display: block; }

  .drop-item {
    padding: 10px 16px;
    font-size: 14px;
    color: #1a3a5c;
    cursor: pointer;
    transition: background 0.15s;
  }

  .drop-item:hover { background: rgba(90,150,210,0.08); }

  .updated {
    font-size: 10px;
    color: #9ab5cc;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.25; }
    50% { opacity: 0.6; }
  }
  .loading .uv-big  { animation: pulse 1.2s ease-in-out infinite; }
  .loading .temp-row { animation: pulse 1.2s ease-in-out infinite; }
</style>
</head>
<body>

<div class="sky"></div>
<div class="clouds">
  <div class="cloud c1"></div><div class="cloud c2"></div>
  <div class="cloud c3"></div><div class="cloud c4"></div>
  <div class="cloud c5"></div><div class="cloud c6"></div>
  <div class="cloud c7"></div>
</div>

<div class="main">
  <div class="card loading" id="card">
    <div class="city-name" id="cityName">Определение...</div>
    <div class="subtitle">УФ-индекс · Вьетнам</div>
    <div class="uv-big" id="uvNum">–</div>
    <div class="uv-label" id="uvLabel">загрузка</div>
    <div class="temp-row" id="temp">–</div>
    <div class="tip-box" id="tip">Получение данных...</div>
  </div>

  <button class="geo-btn" onclick="geoLocate()">📍 Моё местоположение</button>

  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="text" placeholder="🔍 Найти город..." autocomplete="off"/>
    <div class="dropdown" id="dropdown"></div>
  </div>

  <div class="updated" id="updated"></div>
</div>

<script>
const CITIES = [
  { name: 'Дананг',        lat: 16.047, lon: 108.206 },
  { name: 'Хой Ан',        lat: 15.880, lon: 108.335 },
  { name: 'Хюэ',           lat: 16.463, lon: 107.590 },
  { name: 'Нячанг',        lat: 12.238, lon: 109.196 },
  { name: 'Хошимин',       lat: 10.823, lon: 106.629 },
  { name: 'Ханой',         lat: 21.027, lon: 105.834 },
  { name: 'Далат',         lat: 11.940, lon: 108.458 },
  { name: 'Фукуок',        lat: 10.227, lon: 103.964 },
  { name: 'Муй Не',        lat: 10.933, lon: 108.286 },
  { name: 'Халонг',        lat: 20.959, lon: 107.042 },
  { name: 'Шапа',          lat: 22.336, lon: 103.844 },
  { name: 'Нинь Бинь',     lat: 20.253, lon: 105.975 },
  { name: 'Фан Тхьет',     lat: 10.929, lon: 108.102 },
  { name: 'Вунг Тау',      lat: 10.346, lon: 107.084 },
  { name: 'Кан Тхо',       lat: 10.045, lon: 105.748 },
  { name: 'Куи Нён',       lat: 13.776, lon: 109.223 },
  { name: 'Куанг Нгай',    lat: 15.120, lon: 108.792 },
  { name: 'Буон Ма Тхуот', lat: 12.667, lon: 108.050 },
  { name: 'Плейку',        lat: 13.983, lon: 108.000 },
  { name: 'Кон Тум',       lat: 14.350, lon: 108.000 },
  { name: 'Тхань Хоа',     lat: 19.808, lon: 105.776 },
  { name: 'Винь',          lat: 18.680, lon: 105.681 },
  { name: 'Донг Хой',      lat: 17.480, lon: 106.600 },
  { name: 'Хай Фонг',      lat: 20.844, lon: 106.688 },
  { name: 'Лао Кай',       lat: 22.485, lon: 103.975 },
  { name: 'Диен Бьен Фу',  lat: 21.386, lon: 103.016 },
  { name: 'Фан Ранг',      lat: 11.565, lon: 108.988 },
  { name: 'Биен Хоа',      lat: 10.958, lon: 106.843 },
  { name: 'Вьет Три',      lat: 21.399, lon: 105.438 },
  { name: 'Ми Тхо',        lat: 10.360, lon: 106.362 },
  { name: 'Камау',         lat: 9.177,  lon: 105.150 },
  { name: 'Рать Жиа',      lat: 10.012, lon: 105.080 },
  { name: 'Бен Тре',       lat: 10.243, lon: 106.375 },
  { name: 'Ан Жанг',       lat: 10.388, lon: 105.435 },
  { name: 'Тай Нинь',      lat: 11.310, lon: 106.100 },
  { name: 'Ха Тинь',       lat: 18.342, lon: 105.906 },
  { name: 'Нам Динь',      lat: 20.420, lon: 106.168 },
  { name: 'Тхай Нгуен',    lat: 21.567, lon: 105.825 },
  { name: 'Хоа Бинь',      lat: 20.813, lon: 105.338 },
];

function uvInfo(uv) {
  if (uv <= 2)  return { label: 'Низкий',        color: '#3aaa6e', tip: '<strong>Защита не обязательна.</strong> Можно находиться на солнце без ограничений.' };
  if (uv <= 5)  return { label: 'Умеренный',     color: '#c8960a', tip: '<strong>SPF 30+, солнечные очки.</strong> Тень рекомендуется в полдень.' };
  if (uv <= 7)  return { label: 'Высокий',       color: '#d46a20', tip: '<strong>SPF 50+, тень с 11 до 16ч.</strong> Головной убор обязателен.' };
  if (uv <= 10) return { label: 'Очень высокий', color: '#c43030', tip: '<strong>SPF 50+, минимум на улице.</strong> Кожа горит за 15–20 минут.' };
  return             { label: 'Экстремальный',   color: '#8b3daf', tip: '<strong>Оставайтесь в помещении.</strong> Максимальная защита при выходе.' };
}

let currentLat = null, currentLon = null, currentName = 'Дананг';

async function loadByCoords(lat, lon, name) {
  currentLat = lat; currentLon = lon; currentName = name;
  document.getElementById('card').classList.add('loading');
  document.getElementById('cityName').textContent = name;
  try {
    const url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lat +
      '&longitude=' + lon +
      '&current=uv_index,temperature_2m' +
      '&timezone=Asia%2FHo_Chi_Minh&forecast_days=1';
    const res = await fetch(url);
    const data = await res.json();
    const c = data.current;
    const uv = Math.round(c.uv_index * 10) / 10;
    const info = uvInfo(uv);

    document.documentElement.style.setProperty('--uv-color', info.color);
    document.getElementById('card').classList.remove('loading');
    document.getElementById('uvNum').textContent = uv;
    document.getElementById('uvLabel').textContent = info.label;
    document.getElementById('temp').textContent = Math.round(c.temperature_2m) + '°C';
    document.getElementById('tip').innerHTML = info.tip;

    const now = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('updated').textContent = 'Обновлено ' + now + ' (UTC+7)';
  } catch(e) {
    document.getElementById('card').classList.remove('loading');
    document.getElementById('tip').textContent = 'Ошибка загрузки. Проверьте интернет.';
  }
}

function geoLocate() {
  if (!navigator.geolocation) { loadByCoords(16.047, 108.206, 'Дананг'); return; }
  document.getElementById('cityName').textContent = 'Определение...';
  navigator.geolocation.getCurrentPosition(
    pos => loadByCoords(pos.coords.latitude, pos.coords.longitude, 'Моё местоположение'),
    ()  => loadByCoords(16.047, 108.206, 'Дананг')
  );
}

const searchInput = document.getElementById('searchInput');
const dropdown    = document.getElementById('dropdown');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) { dropdown.classList.remove('open'); return; }
  const results = CITIES.filter(c => c.name.toLowerCase().includes(q)).slice(0, 8);
  if (!results.length) { dropdown.classList.remove('open'); return; }
  dropdown.innerHTML = results.map(c =>
    '<div class="drop-item" onclick="selectCity(\'' + c.name + '\',' + c.lat + ',' + c.lon + ')">' + c.name + '</div>'
  ).join('');
  dropdown.classList.add('open');
});

function selectCity(name, lat, lon) {
  searchInput.value = '';
  dropdown.classList.remove('open');
  loadByCoords(lat, lon, name);
}

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) dropdown.classList.remove('open');
});

geoLocate();
setInterval(() => {
  if (currentLat) loadByCoords(currentLat, currentLon, currentName);
}, 30 * 60 * 1000);
</script>
</body>
</html>
