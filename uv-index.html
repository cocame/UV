<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UV Index</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap');

  :root {
    --bg: #0a0c10;
    --card: #111318;
    --border: rgba(255,255,255,0.08);
    --text: #f0ece3;
    --muted: #5a6070;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    padding: 32px 16px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
  }

  header h1 {
    font-size: clamp(24px, 6vw, 40px);
    font-weight: 800;
    letter-spacing: -1px;
    color: var(--text);
  }

  header p {
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  .legend {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--muted);
  }

  .dot { width: 7px; height: 7px; border-radius: 50%; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 10px;
    max-width: 860px;
    margin: 0 auto;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 18px 16px 16px;
    position: relative;
    overflow: hidden;
    transition: transform 0.18s, border-color 0.18s;
  }

  .card:hover {
    transform: translateY(-3px);
    border-color: rgba(255,255,255,0.15);
  }

  .card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 18px 18px 0 0;
    background: var(--uv-color, #333);
  }

  .city { font-size: 14px; font-weight: 600; margin-bottom: 14px; }

  .uv-num {
    font-size: 48px;
    font-weight: 800;
    line-height: 1;
    color: var(--uv-color, var(--muted));
    margin-bottom: 4px;
    transition: color 0.4s;
  }

  .uv-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--uv-color, var(--muted));
    margin-bottom: 10px;
  }

  .tip {
    font-size: 10px;
    color: var(--muted);
    line-height: 1.5;
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
    padding: 6px 8px;
  }

  .footer {
    text-align: center;
    margin-top: 28px;
    font-size: 11px;
    color: var(--muted);
  }

  @media (max-width: 420px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
  }
  .loading .uv-num { animation: pulse 1.2s ease-in-out infinite; }
</style>
</head>
<body>

<header>
  <h1>☀️ УФ-индекс</h1>
  <p>Вьетнам · реальное время · Open-Meteo</p>
</header>

<div class="legend">
  <div class="legend-item"><div class="dot" style="background:#4ade80"></div>0–2 Низкий</div>
  <div class="legend-item"><div class="dot" style="background:#facc15"></div>3–5 Умеренный</div>
  <div class="legend-item"><div class="dot" style="background:#fb923c"></div>6–7 Высокий</div>
  <div class="legend-item"><div class="dot" style="background:#f87171"></div>8–10 Очень высокий</div>
  <div class="legend-item"><div class="dot" style="background:#c084fc"></div>11+ Экстремальный</div>
</div>

<div class="grid" id="grid"></div>
<div class="footer" id="footer"></div>

<script>
const CITIES = [
  { name: 'Дананг',   lat: 16.047, lon: 108.206 },
  { name: 'Хой Ан',  lat: 15.880, lon: 108.335 },
  { name: 'Хюэ',     lat: 16.463, lon: 107.590 },
  { name: 'Нячанг',  lat: 12.238, lon: 109.196 },
  { name: 'Хошимин', lat: 10.823, lon: 106.629 },
  { name: 'Ханой',   lat: 21.027, lon: 105.834 },
  { name: 'Далат',   lat: 11.940, lon: 108.458 },
  { name: 'Фукуок',  lat: 10.227, lon: 103.964 },
  { name: 'Муй Не',  lat: 10.933, lon: 108.286 },
];

function uvInfo(uv) {
  if (uv === null) return { label: '—', color: '#5a6070', tip: 'Загрузка...' };
  if (uv <= 2)  return { label: 'Низкий',        color: '#4ade80', tip: 'Защита не обязательна' };
  if (uv <= 5)  return { label: 'Умеренный',     color: '#facc15', tip: 'SPF 30+, очки' };
  if (uv <= 7)  return { label: 'Высокий',       color: '#fb923c', tip: 'SPF 50+, тень 11–16ч' };
  if (uv <= 10) return { label: 'Очень высокий', color: '#f87171', tip: 'SPF 50+, минимум на улице' };
  return             { label: 'Экстремальный',   color: '#c084fc', tip: 'Оставайтесь в помещении' };
}

function renderCards() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  CITIES.forEach((city, i) => {
    const card = document.createElement('div');
    card.className = 'card loading';
    card.id = 'card-' + i;
    card.innerHTML =
      '<div class="city">' + city.name + '</div>' +
      '<div class="uv-num" id="num-' + i + '">–</div>' +
      '<div class="uv-label" id="lbl-' + i + '">...</div>' +
      '<div class="tip" id="tip-' + i + '">Получение данных</div>';
    grid.appendChild(card);
  });
}

async function fetchUV(city, index) {
  try {
    const url = 'https://api.open-meteo.com/v1/forecast?latitude=' + city.lat +
      '&longitude=' + city.lon +
      '&current=uv_index&timezone=Asia%2FHo_Chi_Minh&forecast_days=1';
    const res = await fetch(url);
    const data = await res.json();
    const uv = Math.round(data.current.uv_index * 10) / 10;
    const info = uvInfo(uv);

    const card = document.getElementById('card-' + index);
    card.classList.remove('loading');
    card.style.setProperty('--uv-color', info.color);
    document.getElementById('num-' + index).textContent = uv;
    document.getElementById('lbl-' + index).textContent = info.label;
    document.getElementById('tip-' + index).textContent = info.tip;
  } catch (e) {
    document.getElementById('tip-' + index).textContent = 'Ошибка загрузки';
  }
}

function updateFooter() {
  const now = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('footer').textContent = 'Обновлено: ' + now + ' (вьетнамское время UTC+7)';
}

async function loadAll() {
  renderCards();
  await Promise.all(CITIES.map((city, i) => fetchUV(city, i)));
  updateFooter();
}

loadAll();
setInterval(loadAll, 30 * 60 * 1000);
</script>
</body>
</html>
